name: Benchmark

on:
  workflow_dispatch:
  push:
    branches: [main]

# Only one benchmark at a time; cancel older runs
concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

jobs:
  parser-bench:
    name: Parser Benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run parser benchmarks
        run: pnpm --filter @react-term/bench bench | tee parser-bench-output.txt
        env:
          NO_COLOR: 1
      - name: Upload parser results
        uses: actions/upload-artifact@v4
        with:
          name: parser-bench-results
          path: parser-bench-output.txt

  e2e-bench:
    name: E2E Benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm --filter @react-term/e2e-bench exec playwright install chromium --with-deps
      - name: Run E2E benchmarks
        run: pnpm --filter @react-term/e2e-bench bench 2>&1 | tee e2e-bench-output.txt
      - name: Upload E2E results JSON
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-bench-results
          path: |
            packages/e2e-bench/results/*.json
            e2e-bench-output.txt

  report:
    name: Benchmark Report
    runs-on: ubuntu-latest
    needs: [parser-bench, e2e-bench]
    if: always()
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate report
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Strip ANSI escape codes from text
            const stripAnsi = (s) => s.replace(/\x1B\[[0-9;]*[a-zA-Z]/g, '');

            let report = '# Benchmark Report\n\n';

            // --- Parser benchmarks ---
            report += '## Parser Benchmarks (vitest bench)\n\n';
            const parserFile = path.join('artifacts', 'parser-bench-results', 'parser-bench-output.txt');
            if (fs.existsSync(parserFile)) {
              const raw = stripAnsi(fs.readFileSync(parserFile, 'utf-8'));
              const lines = raw.split('\n');

              // Parse structured data from vitest bench output
              const scenarios = [];
              let currentScenario = null;
              for (const line of lines) {
                // Scenario header: "✓ src/benches/parser.bench.ts > scenario-name 1234ms"
                const scenarioMatch = line.match(/[✓✗]\s+\S+\s+>\s+(\S+)/);
                if (scenarioMatch) {
                  currentScenario = { name: scenarioMatch[1], results: [] };
                  scenarios.push(currentScenario);
                  continue;
                }
                // Result row: "· react-term  10.4681  89.5468 ..."
                const resultMatch = line.match(/[·]\s+([\w-]+)\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)/);
                if (resultMatch && currentScenario) {
                  currentScenario.results.push({
                    name: resultMatch[1],
                    hz: parseFloat(resultMatch[2]),
                    min: parseFloat(resultMatch[3]),
                    max: parseFloat(resultMatch[4]),
                    mean: parseFloat(resultMatch[5]),
                  });
                  continue;
                }
                // Comparison line: "react-term - ... > scenario-name\n  1.58x faster than xterm-headless"
                const compMatch = line.match(/([\d.]+)x\s+faster than\s+([\w-]+)/);
                if (compMatch && currentScenario) {
                  currentScenario.speedup = parseFloat(compMatch[1]);
                  currentScenario.faster = line.includes('react-term') ? 'react-term' : compMatch[2];
                }
              }

              if (scenarios.length > 0) {
                report += '| Scenario | react-term (ms) | xterm (ms) | Winner | Speedup |\n';
                report += '|----------|----------------|-----------|--------|--------|\n';
                for (const s of scenarios) {
                  const rt = s.results.find(r => r.name === 'react-term');
                  const xt = s.results.find(r => r.name === 'xterm-headless');
                  const rtMean = rt ? rt.mean.toFixed(1) : '-';
                  const xtMean = xt ? xt.mean.toFixed(1) : '-';
                  let winner = '-';
                  let speedup = '-';
                  if (rt && xt) {
                    if (rt.mean < xt.mean) {
                      winner = 'react-term';
                      speedup = (xt.mean / rt.mean).toFixed(2) + 'x';
                    } else {
                      winner = 'xterm';
                      speedup = (rt.mean / xt.mean).toFixed(2) + 'x';
                    }
                  }
                  report += `| ${s.name} | ${rtMean} | ${xtMean} | ${winner} | ${speedup} |\n`;
                }
                report += '\n';
              }

              // Also include raw output in a collapsed section
              report += '<details><summary>Raw vitest bench output</summary>\n\n```\n';
              report += raw.trim();
              report += '\n```\n</details>\n\n';
            } else {
              report += '_Parser benchmark results not available._\n\n';
            }

            // --- E2E benchmarks ---
            report += '## E2E Benchmarks (Playwright)\n\n';

            // Try to find and parse the JSON results
            const e2eDir = path.join('artifacts', 'e2e-bench-results');
            let jsonResults = null;
            if (fs.existsSync(e2eDir)) {
              const files = fs.readdirSync(e2eDir).filter(f => f.endsWith('.json'));
              if (files.length > 0) {
                const jsonPath = path.join(e2eDir, files[files.length - 1]);
                try {
                  jsonResults = JSON.parse(fs.readFileSync(jsonPath, 'utf-8'));
                } catch {}
              }
            }

            if (jsonResults && jsonResults.length > 0) {
              // Group by terminal + scenario
              const grouped = new Map();
              for (const r of jsonResults) {
                const key = `${r.terminal}|${r.scenario}`;
                if (!grouped.has(key)) grouped.set(key, []);
                grouped.get(key).push(r);
              }

              report += '| Terminal | Scenario | Avg Time (ms) | Avg FPS | Throughput (MB/s) | Runs |\n';
              report += '|----------|----------|--------------|---------|------------------|------|\n';

              for (const [key, runs] of grouped) {
                const [terminal, scenario] = key.split('|');
                const avgTime = (runs.reduce((s, r) => s + r.metrics.totalTimeMs, 0) / runs.length).toFixed(1);
                const avgFps = (runs.reduce((s, r) => s + r.metrics.avgFps, 0) / runs.length).toFixed(1);
                const avgMBps = (runs.reduce((s, r) => s + r.metrics.throughputMBps, 0) / runs.length).toFixed(2);
                report += `| ${terminal} | ${scenario} | ${avgTime} | ${avgFps} | ${avgMBps} | ${runs.length} |\n`;
              }

              // Compute per-scenario speedup
              report += '\n### Throughput Comparison\n\n';
              report += '| Scenario | react-term (MB/s) | xterm (MB/s) | Speedup |\n';
              report += '|----------|-------------------|-------------|--------|\n';

              const byScenario = new Map();
              for (const [key, runs] of grouped) {
                const [terminal, scenario] = key.split('|');
                if (!byScenario.has(scenario)) byScenario.set(scenario, {});
                byScenario.get(scenario)[terminal] = (runs.reduce((s, r) => s + r.metrics.throughputMBps, 0) / runs.length);
              }

              for (const [scenario, terms] of byScenario) {
                const rt = terms['react-term'];
                const xt = terms['xterm'];
                if (rt != null && xt != null && xt > 0) {
                  report += `| ${scenario} | ${rt.toFixed(2)} | ${xt.toFixed(2)} | ${(rt / xt).toFixed(1)}x |\n`;
                } else if (rt != null) {
                  report += `| ${scenario} | ${rt.toFixed(2)} | - | - |\n`;
                }
              }

              report += `\n_Total results: ${jsonResults.length}_\n`;
            } else {
              // Fall back to text output
              const e2eFile = path.join(e2eDir || '', 'e2e-bench-output.txt');
              if (fs.existsSync(e2eFile)) {
                const e2eOutput = fs.readFileSync(e2eFile, 'utf-8');
                report += '```\n' + e2eOutput.slice(-3000) + '\n```\n';
              } else {
                report += '_E2E benchmark results not available._\n';
              }
            }

            report += '\n---\n_Generated by benchmark workflow on ' + new Date().toISOString().split('T')[0] + '_\n';

            // Write to job summary
            await core.summary.addRaw(report).write();

            // Also write to file for artifact
            fs.writeFileSync('benchmark-report.md', report);

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: benchmark-report.md
