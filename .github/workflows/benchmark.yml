name: Benchmark

on:
  workflow_dispatch:
  push:
    branches: [main]

# Only one benchmark at a time; cancel older runs
concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: true

jobs:
  parser-bench:
    name: Parser Benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run parser benchmarks
        run: pnpm --filter @next_term/bench bench | tee parser-bench-output.txt
        env:
          NO_COLOR: 1
      - name: Upload parser results
        uses: actions/upload-artifact@v7
        with:
          name: parser-bench-results
          path: parser-bench-output.txt

  e2e-react-term:
    name: E2E — react-term
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm --filter @next_term/e2e-bench exec playwright install chromium --with-deps
      - name: Run react-term benchmarks
        run: cd packages/e2e-bench && npx playwright test --grep "e2e benchmark" 2>&1 | tee ../../e2e-bench-output.txt
        env:
          BENCH_TERMINAL: react-term
      - name: Upload results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: e2e-react-term-results
          path: |
            packages/e2e-bench/results/*.json
            e2e-bench-output.txt

  e2e-xterm:
    name: E2E — xterm
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm --filter @next_term/e2e-bench exec playwright install chromium --with-deps
      - name: Run xterm benchmarks
        run: cd packages/e2e-bench && npx playwright test --grep "e2e benchmark" 2>&1 | tee ../../e2e-bench-output.txt
        env:
          BENCH_TERMINAL: xterm
      - name: Upload results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: e2e-xterm-results
          path: |
            packages/e2e-bench/results/*.json
            e2e-bench-output.txt

  e2e-multi-pane-linux:
    name: E2E — multi-pane (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm --filter @next_term/e2e-bench exec playwright install chromium --with-deps
      - name: Run multi-pane benchmarks
        run: cd packages/e2e-bench && npx playwright test --grep "multi-pane" 2>&1 | tee ../../e2e-bench-output.txt
      - name: Upload results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: e2e-multi-pane-linux-results
          path: |
            packages/e2e-bench/results/*.json
            e2e-bench-output.txt

  e2e-mux-linux:
    name: E2E — mux (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm --filter @next_term/e2e-bench exec playwright install chromium --with-deps
      - name: Run mux benchmarks
        run: cd packages/e2e-bench && npx playwright test --grep "mux benchmark" 2>&1 | tee ../../e2e-bench-output.txt
      - name: Upload results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: e2e-mux-linux-results
          path: |
            packages/e2e-bench/results/*.json
            e2e-bench-output.txt

  report:
    name: Benchmark Report
    runs-on: ubuntu-latest
    needs: [parser-bench, e2e-react-term, e2e-xterm, e2e-multi-pane-linux, e2e-mux-linux]
    if: always()
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Generate report
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Strip ANSI escape codes from text
            const stripAnsi = (s) => s.replace(/\x1B\[[0-9;]*[a-zA-Z]/g, '');

            let report = '# Benchmark Report\n\n';

            // --- Parser benchmarks ---
            report += '## Parser Benchmarks (vitest bench)\n\n';
            const parserFile = path.join('artifacts', 'parser-bench-results', 'parser-bench-output.txt');
            if (fs.existsSync(parserFile)) {
              const raw = stripAnsi(fs.readFileSync(parserFile, 'utf-8'));
              const lines = raw.split('\n');

              // Parse structured data from vitest bench output
              const scenarios = [];
              let currentScenario = null;
              for (const line of lines) {
                // Scenario header: "✓ src/benches/parser.bench.ts > scenario-name 1234ms"
                const scenarioMatch = line.match(/[✓✗]\s+\S+\s+>\s+(\S+)/);
                if (scenarioMatch) {
                  currentScenario = { name: scenarioMatch[1], results: [] };
                  scenarios.push(currentScenario);
                  continue;
                }
                // Result row: "· react-term  10.4681  89.5468 ..."
                const resultMatch = line.match(/[·]\s+([\w-]+)\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)/);
                if (resultMatch && currentScenario) {
                  currentScenario.results.push({
                    name: resultMatch[1],
                    hz: parseFloat(resultMatch[2]),
                    min: parseFloat(resultMatch[3]),
                    max: parseFloat(resultMatch[4]),
                    mean: parseFloat(resultMatch[5]),
                  });
                  continue;
                }
                // Comparison line: "react-term - ... > scenario-name\n  1.58x faster than xterm-headless"
                const compMatch = line.match(/([\d.]+)x\s+faster than\s+([\w-]+)/);
                if (compMatch && currentScenario) {
                  currentScenario.speedup = parseFloat(compMatch[1]);
                  currentScenario.faster = line.includes('react-term') ? 'react-term' : compMatch[2];
                }
              }

              if (scenarios.length > 0) {
                report += '| Scenario | react-term (ms) | xterm (ms) | Winner | Speedup |\n';
                report += '|----------|----------------|-----------|--------|--------|\n';
                for (const s of scenarios) {
                  const rt = s.results.find(r => r.name === 'react-term');
                  const xt = s.results.find(r => r.name === 'xterm-headless');
                  const rtMean = rt ? rt.mean.toFixed(1) : '-';
                  const xtMean = xt ? xt.mean.toFixed(1) : '-';
                  let winner = '-';
                  let speedup = '-';
                  if (rt && xt) {
                    if (rt.mean < xt.mean) {
                      winner = 'react-term';
                      speedup = (xt.mean / rt.mean).toFixed(2) + 'x';
                    } else {
                      winner = 'xterm';
                      speedup = (rt.mean / xt.mean).toFixed(2) + 'x';
                    }
                  }
                  report += `| ${s.name} | ${rtMean} | ${xtMean} | ${winner} | ${speedup} |\n`;
                }
                report += '\n';
              }

              // Also include raw output in a collapsed section
              report += '<details><summary>Raw vitest bench output</summary>\n\n```\n';
              report += raw.trim();
              report += '\n```\n</details>\n\n';
            } else {
              report += '_Parser benchmark results not available._\n\n';
            }

            // --- E2E benchmarks ---
            report += '## E2E Benchmarks (Playwright)\n\n';

            function findJsonFiles(dir) {
              let results = [];
              if (!fs.existsSync(dir)) return results;
              for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
                const full = path.join(dir, entry.name);
                if (entry.isDirectory()) results.push(...findJsonFiles(full));
                else if (entry.name.endsWith('.json')) results.push(full);
              }
              return results;
            }

            // Merge single-pane results from both terminal jobs
            let jsonResults = [];
            for (const artifactName of ['e2e-react-term-results', 'e2e-xterm-results']) {
              const dir = path.join('artifacts', artifactName);
              for (const f of findJsonFiles(dir).filter(f => !f.includes('multi-pane'))) {
                try { jsonResults.push(...JSON.parse(fs.readFileSync(f, 'utf-8'))); } catch {}
              }
            }
            if (jsonResults.length === 0) jsonResults = null;

            if (jsonResults && jsonResults.length > 0) {
              // Aggregate per scenario
              const byScenario = new Map();
              for (const r of jsonResults) {
                if (!byScenario.has(r.scenario)) byScenario.set(r.scenario, {});
                const entry = byScenario.get(r.scenario);
                if (!entry[r.terminal]) entry[r.terminal] = { mbps: [], frameP50: [], frameP90: [], frameP99: [], idle: [] };
                const t = entry[r.terminal];
                t.mbps.push(r.metrics.throughputMBps);
                t.frameP50.push(r.metrics.frameTimeP50);
                t.frameP90.push(r.metrics.frameTimeP90);
                t.frameP99.push(r.metrics.frameTimeP99);
                t.idle.push(r.metrics.timeToIdleMs);
              }
              const avg = arr => arr.reduce((a, b) => a + b, 0) / arr.length;
              const scenarios = [...byScenario.keys()];

              // Build markdown table with bar visualization
              const maxBarLen = 20;
              function buildTable(title, unit, getValue) {
                let maxVal = 0;
                const data = scenarios.map(s => {
                  const e = byScenario.get(s);
                  const rt = e['react-term'] ? getValue(e['react-term']) : 0;
                  const xt = e['xterm'] ? getValue(e['xterm']) : 0;
                  maxVal = Math.max(maxVal, rt, xt);
                  return { scenario: s, rt, xt };
                });
                const bar = (val) => {
                  const len = maxVal > 0 ? Math.round((val / maxVal) * maxBarLen) : 0;
                  return '█'.repeat(len) + '░'.repeat(maxBarLen - len);
                };

                let md = `| Scenario | react-term | ${unit} | xterm | ${unit} |\n`;
                md += '|----------|------------|------|-------|------|\n';
                for (const d of data) {
                  md += `| ${d.scenario} | \`${bar(d.rt)}\` | ${d.rt.toFixed(1)} | \`${bar(d.xt)}\` | ${d.xt.toFixed(1)} |\n`;
                }
                return md;
              }

              report += '### Throughput — MB/s (higher is better)\n\n';
              report += buildTable('Throughput', 'MB/s', t => avg(t.mbps)) + '\n';

              report += '### Frame Time p50 — ms (lower is smoother)\n\n';
              report += buildTable('Frame p50', 'ms', t => avg(t.frameP50)) + '\n';

              report += '### Frame Time p90 — ms (lower = less jank)\n\n';
              report += buildTable('Frame p90', 'ms', t => avg(t.frameP90)) + '\n';

              report += '### Frame Time p99 — ms (lower = less jank)\n\n';
              report += buildTable('Frame p99', 'ms', t => avg(t.frameP99)) + '\n';

              report += '### Time to Idle — ms (lower is better)\n\n';
              report += buildTable('Idle', 'ms', t => avg(t.idle)) + '\n';

              // Keep a summary table for quick reference
              report += '<details><summary>Detailed results table</summary>\n\n';
              report += '| Scenario | react-term (MB/s) | xterm (MB/s) | Speedup |\n';
              report += '|----------|-------------------|-------------|--------|\n';
              for (const [scenario, terms] of byScenario) {
                const rt = terms['react-term'] ? avg(terms['react-term'].mbps) : null;
                const xt = terms['xterm'] ? avg(terms['xterm'].mbps) : null;
                if (rt != null && xt != null && xt > 0) {
                  report += `| ${scenario} | ${rt.toFixed(2)} | ${xt.toFixed(2)} | ${(rt / xt).toFixed(1)}x |\n`;
                } else if (rt != null) {
                  report += `| ${scenario} | ${rt.toFixed(2)} | - | - |\n`;
                }
              }
              report += '\n</details>\n';

              report += `\n_Total results: ${jsonResults.length}_\n`;
            }

            // --- Multi-pane benchmarks (Linux + macOS) ---
            const mpBarLen = 20;
            const mpBar = (val, maxVal) => {
              const len = maxVal > 0 ? Math.round((val / maxVal) * mpBarLen) : 0;
              return '█'.repeat(len) + '░'.repeat(mpBarLen - len);
            };
            const mpAvg = arr => arr.reduce((a, b) => a + b, 0) / arr.length;

            function loadMpResults(artifactName) {
              const dir = path.join('artifacts', artifactName);
              const files = findJsonFiles(dir).filter(f => f.includes('multi-pane'));
              if (files.length === 0) return null;
              try { return JSON.parse(fs.readFileSync(files[files.length - 1], 'utf-8')); } catch { return null; }
            }

            function renderMpSection(label, results) {
              if (!results || results.length === 0) return;
              report += `\n### ${label}\n\n`;

              const grouped = new Map();
              for (const r of results) {
                const key = `${r.terminal}|${r.paneCount}`;
                if (!grouped.has(key)) grouped.set(key, []);
                grouped.get(key).push(r);
              }

              const paneCounts = [...new Set(results.map(r => r.paneCount))].sort((a, b) => a - b);
              const byPane = {};
              for (const [key, runs] of grouped) {
                const [term, panes] = key.split('|');
                if (!byPane[panes]) byPane[panes] = {};
                byPane[panes][term] = {
                  mbps: mpAvg(runs.map(r => r.metrics.throughputMBps)),
                  frameP50: mpAvg(runs.map(r => r.metrics.frameTimeP50)),
                  frameP90: mpAvg(runs.map(r => r.metrics.frameTimeP90)),
                  frameP99: mpAvg(runs.map(r => r.metrics.frameTimeP99)),
                  idle: mpAvg(runs.map(r => r.metrics.timeToIdleMs)),
                  stAvg: mpAvg(runs.map(r => r.responsiveness.avgSetTimeoutDelay)),
                  stMax: mpAvg(runs.map(r => r.responsiveness.maxSetTimeoutDelay)),
                };
              }

              function mpTable(unit, getter) {
                let maxVal = 0;
                const rows = paneCounts.map(p => {
                  const rt = byPane[p]?.['react-term'] ? getter(byPane[p]['react-term']) : 0;
                  const xt = byPane[p]?.['xterm'] ? getter(byPane[p]['xterm']) : 0;
                  maxVal = Math.max(maxVal, rt, xt);
                  return { panes: p, rt, xt };
                });
                let md = `| Panes | react-term | ${unit} | xterm | ${unit} |\n`;
                md += '|-------|------------|------|-------|------|\n';
                for (const r of rows) {
                  md += `| ${r.panes} | \`${mpBar(r.rt, maxVal)}\` | ${r.rt.toFixed(1)} | \`${mpBar(r.xt, maxVal)}\` | ${r.xt.toFixed(1)} |\n`;
                }
                return md;
              }

              report += '**Throughput — MB/s (higher is better)**\n\n';
              report += mpTable('MB/s', d => d.mbps) + '\n';
              report += '**Frame Time p50 — ms (lower is smoother)**\n\n';
              report += mpTable('ms', d => d.frameP50) + '\n';
              report += '**Frame Time p90 — ms (lower = less jank)**\n\n';
              report += mpTable('ms', d => d.frameP90) + '\n';
              report += '**Frame Time p99 — ms (lower = less jank)**\n\n';
              report += mpTable('ms', d => d.frameP99) + '\n';
              report += '**Time to Idle — ms (lower is better)**\n\n';
              report += mpTable('ms', d => d.idle) + '\n';
              report += '**Main Thread Responsiveness — setTimeout avg ms (lower is better)**\n\n';
              report += mpTable('ms', d => d.stAvg) + '\n';
              report += '**Worst-Case Blocking — setTimeout max ms (lower is better)**\n\n';
              report += mpTable('ms', d => d.stMax) + '\n';
              report += `_${results.length} results_\n`;
            }

            const mpLinux = loadMpResults('e2e-multi-pane-linux-results');
            const mpResults = mpLinux;

            if (mpLinux) {
              report += '\n## Multi-Pane Benchmark (N WebSockets — stress test)\n\n';
              report += 'Each pane gets its own WebSocket. Tests event loop under parallel load.\n\n';
              renderMpSection('Linux (Canvas2D, software rendering)', mpLinux);
            }

            // --- Mux benchmarks (single WebSocket, interleaved — realistic) ---
            function loadMuxResults(artifactName) {
              const dir = path.join('artifacts', artifactName);
              const files = findJsonFiles(dir).filter(f => f.includes('mux'));
              if (files.length === 0) return null;
              try { return JSON.parse(fs.readFileSync(files[files.length - 1], 'utf-8')); } catch { return null; }
            }

            const muxLinux = loadMuxResults('e2e-mux-linux-results');

            if (muxLinux) {
              report += '\n## Mux Benchmark (single WebSocket — realistic)\n\n';
              report += 'Single connection demuxes to N panes, simulating tmux/screen.\n\n';
              renderMpSection('Linux (Canvas2D, software rendering)', muxLinux);
            }

            if (!jsonResults && !mpResults && !muxLinux) {
              report += '_E2E benchmark results not available._\n';
            }

            report += '\n---\n_Generated by benchmark workflow on ' + new Date().toISOString().split('T')[0] + '_\n';

            // Write to job summary
            await core.summary.addRaw(report).write();

            // Also write to file for artifact
            fs.writeFileSync('benchmark-report.md', report);

      - name: Upload report
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-report
          path: benchmark-report.md
